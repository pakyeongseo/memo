<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1f2b4d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>잉크 — 메모</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface-2: #ece8df;
    --ink: #1c1b19;
    --muted: #6f6a60;
    --faint: #a8a298;
    --line: #ddd7cb;
    --accent: #2f4275;
    --accent-soft: #e7eaf3;
    --danger: #9a3b3b;
    --shadow: 0 1px 2px rgba(28,27,25,.06), 0 8px 28px rgba(28,27,25,.10);
    --drawer-w: 300px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html[data-theme="dark"] {
    --bg: #14161d;
    --surface: #1c1f29;
    --surface-2: #232732;
    --ink: #e9e7e1;
    --muted: #9b9788;
    --faint: #6a675e;
    --line: #2c303c;
    --accent: #8da4e0;
    --accent-soft: #232b41;
    --danger: #d77a7a;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    display: flex; flex-direction: column;
    height: 100dvh;
  }

  /* ===== Top bar ===== */
  .topbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 4px;
    padding: calc(var(--safe-top) + 8px) 8px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    position: relative; z-index: 30;
  }
  .topbar .title {
    flex: 1; min-width: 0;
    font-size: 17px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 0 4px;
  }
  .iconbtn {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border: none; background: transparent; color: var(--ink);
    border-radius: 12px; cursor: pointer;
    transition: background .15s;
  }
  .iconbtn:active { background: var(--surface-2); }
  .iconbtn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

  /* save status */
  .saver {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
    padding: 0 8px; min-width: 64px; justify-content: flex-end;
    user-select: none;
  }
  .saver .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--faint); transition: background .3s, transform .3s;
  }
  .saver.dirty .dot { background: var(--accent); transform: scale(1.25); }
  .saver.saved .dot { background: #4a8f5b; }
  html[data-theme="dark"] .saver.saved .dot { background: #6fbf83; }

  /* ===== Format toolbar ===== */
  .formatbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    overflow-x: auto; white-space: nowrap;
    scrollbar-width: none;
  }
  .formatbar::-webkit-scrollbar { display: none; }
  .fbtn {
    flex: 0 0 auto;
    min-width: 38px; height: 36px; padding: 0 9px;
    border: none; background: transparent; color: var(--ink);
    border-radius: 9px; cursor: pointer; font-size: 15px;
    display: inline-grid; place-items: center;
  }
  .fbtn:active { background: var(--surface-2); }
  .fbtn.b { font-weight: 800; }
  .fbtn.i { font-style: italic; font-family: Georgia, serif; }
  .fbtn.u { text-decoration: underline; }
  .fbtn.s { text-decoration: line-through; }
  .fbtn svg { width: 19px; height: 19px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .fsep { flex: 0 0 auto; width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
  .fcolor { position: relative; width: 36px; height: 36px; }
  .fcolor input[type=color] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; border: none; padding: 0; cursor: pointer; }
  .fcolor .swatch { pointer-events: none; position: absolute; inset: 7px; border-radius: 7px; border: 1px solid var(--line); background: var(--accent); }

  /* ===== Editor ===== */
  .editor-wrap { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .editor {
    min-height: 100%;
    padding: 20px 18px calc(40px + var(--safe-bottom));
    outline: none;
    font-size: 16.5px; line-height: 1.7;
    color: var(--ink);
    word-break: break-word; overflow-wrap: anywhere;
  }
  .editor:empty::before {
    content: attr(data-placeholder);
    color: var(--faint);
  }
  .editor img { max-width: 100%; height: auto; border-radius: 6px; }
  .editor a { color: var(--accent); }
  .editor table { border-collapse: collapse; max-width: 100%; }
  .editor td, .editor th { border: 1px solid var(--line); padding: 4px 8px; }
  .editor pre { background: var(--surface-2); padding: 12px; border-radius: 8px; overflow-x: auto; }
  .editor blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 2px 0 2px 14px; color: var(--muted); }

  .empty-state {
    height: 100%; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    color: var(--faint); padding: 40px; text-align: center;
  }
  .empty-state svg { width: 56px; height: 56px; stroke: currentColor; fill: none; stroke-width: 1.4; }
  .empty-state .big { font-size: 17px; color: var(--muted); }
  .empty-state button {
    margin-top: 6px; border: 1px solid var(--accent); color: var(--accent);
    background: transparent; padding: 10px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  body.no-note .editor-wrap { display: none; }
  body.no-note .formatbar { display: none; }
  body.no-note .empty-state { display: flex; }
  body:not(.no-note) .empty-state { display: none; }

  /* ===== Drawer ===== */
  .scrim {
    position: fixed; inset: 0; background: rgba(20,18,15,.42);
    opacity: 0; visibility: hidden; transition: opacity .25s, visibility .25s;
    z-index: 40;
  }
  body.drawer-open .scrim { opacity: 1; visibility: visible; }
  .drawer {
    position: fixed; top: 0; bottom: 0; left: 0;
    width: var(--drawer-w); max-width: 84vw;
    background: var(--surface);
    border-right: 1px solid var(--line);
    transform: translateX(-104%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 50;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
  }
  body.drawer-open .drawer { transform: translateX(0); }

  .drawer-head {
    padding: calc(var(--safe-top) + 16px) 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand .logo { font-size: 20px; font-weight: 700; letter-spacing: -.01em; }
  .brand .logo b { color: var(--accent); }
  .brand .sub { font-size: 11px; color: var(--faint); letter-spacing: .08em; text-transform: uppercase; }

  .search {
    margin: 12px 16px 4px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-2); border-radius: 11px;
    padding: 9px 12px;
  }
  .search svg { width: 17px; height: 17px; stroke: var(--muted); fill: none; stroke-width: 2; flex: 0 0 auto; }
  .search input {
    border: none; background: transparent; outline: none;
    color: var(--ink); font-size: 15px; width: 100%;
  }
  .search input::placeholder { color: var(--faint); }

  .notelist { flex: 1 1 auto; overflow-y: auto; padding: 6px 10px 10px; }
  .note-item {
    padding: 11px 12px; border-radius: 12px; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    transition: background .12s;
  }
  .note-item:active { background: var(--surface-2); }
  .note-item.active { background: var(--accent-soft); }
  .note-item .ni-title {
    font-size: 15px; font-weight: 600; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .note-item.active .ni-title { color: var(--accent); }
  .note-item .ni-meta {
    font-size: 12px; color: var(--faint);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-empty { padding: 30px 16px; text-align: center; color: var(--faint); font-size: 14px; }

  .drawer-foot {
    flex: 0 0 auto; padding: 10px 12px calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--line);
    display: flex; gap: 8px;
  }
  .foot-btn {
    flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 8px; border-radius: 11px;
    border: 1px solid var(--line); background: transparent; color: var(--muted);
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .foot-btn:active { background: var(--surface-2); }
  .foot-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .foot-btn.primary {
    border-color: var(--accent); background: var(--accent); color: #fff;
  }
  html[data-theme="dark"] .foot-btn.primary { color: #11131a; }

  /* ===== Sheet menu (per-note actions) ===== */
  .sheet-scrim {
    position: fixed; inset: 0; background: rgba(20,18,15,.42);
    opacity: 0; visibility: hidden; transition: opacity .2s, visibility .2s; z-index: 60;
  }
  body.sheet-open .sheet-scrim { opacity: 1; visibility: visible; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    transform: translateY(102%); transition: transform .26s cubic-bezier(.4,0,.2,1);
    z-index: 70; padding-bottom: var(--safe-bottom);
    box-shadow: var(--shadow);
  }
  body.sheet-open .sheet { transform: translateY(0); }
  .sheet .grip { width: 38px; height: 4px; background: var(--line); border-radius: 999px; margin: 10px auto 6px; }
  .sheet .sheet-title { padding: 6px 20px 10px; font-size: 13px; color: var(--faint); }
  .sheet-item {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 20px; cursor: pointer; font-size: 16px; color: var(--ink);
  }
  .sheet-item:active { background: var(--surface-2); }
  .sheet-item svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }
  .sheet-item.danger { color: var(--danger); }
  .sheet-item:last-child { margin-bottom: 6px; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: calc(28px + var(--safe-bottom));
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg);
    padding: 11px 20px; border-radius: 999px; font-size: 14px;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    z-index: 90; max-width: 86vw; text-align: center;
  }
  .toast.show { opacity: .96; transform: translateX(-50%) translateY(0); }

  .hidden-input { display: none; }
</style>
</head>
<body class="no-note">

  <!-- Top bar -->
  <div class="topbar">
    <button class="iconbtn" id="btnMenu" aria-label="메모 목록">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="title" id="curTitle">메모</div>
    <div class="saver" id="saver"><span class="dot"></span><span id="saverText"></span></div>
    <button class="iconbtn" id="btnMore" aria-label="더보기">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
    </button>
  </div>

  <!-- Format toolbar -->
  <div class="formatbar" id="formatbar">
    <button class="fbtn b" data-cmd="bold" title="굵게">B</button>
    <button class="fbtn i" data-cmd="italic" title="기울임">I</button>
    <button class="fbtn u" data-cmd="underline" title="밑줄">U</button>
    <button class="fbtn s" data-cmd="strikeThrough" title="취소선">S</button>
    <span class="fsep"></span>
    <span class="fcolor"><input type="color" id="colorPick" value="#2f4275"><span class="swatch" id="colorSwatch"></span></span>
    <button class="fbtn" data-cmd="hiliteColor" data-val="#ffe27a" title="형광펜" style="font-weight:700;background:linear-gradient(transparent 60%, #ffe27a 60%)">H</button>
    <span class="fsep"></span>
    <button class="fbtn" data-cmd="insertUnorderedList" title="목록">
      <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="fbtn" data-cmd="insertOrderedList" title="번호 목록">
      <svg viewBox="0 0 24 24"><path d="M9 6h12M9 12h12M9 18h12"/><path d="M3 5h1.5v3M3 11.5h2l-2 2.5h2"/></svg>
    </button>
    <span class="fsep"></span>
    <button class="fbtn" data-cmd="removeFormat" title="서식 지우기">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M7 7l3 13M14 7l-1 5M18 20L6 8"/></svg>
    </button>
    <button class="fbtn" data-cmd="undo" title="실행 취소">
      <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
    </button>
  </div>

  <!-- Editor -->
  <div class="editor-wrap" id="editorWrap">
    <div class="editor" id="editor" contenteditable="true" data-placeholder="여기에 메모를 작성하거나 붙여넣으세요…"></div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M5 3h9l5 5v13H5z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>
    <div class="big">아직 메모가 없어요</div>
    <button id="emptyCreate">첫 메모 만들기</button>
  </div>

  <!-- Drawer -->
  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div class="brand"><span class="logo">잉<b>크</b></span><span class="sub">Ink Memo</span></div>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="text" id="searchInput" placeholder="메모 검색">
    </div>
    <div class="notelist" id="noteList"></div>
    <div class="drawer-foot">
      <button class="foot-btn primary" id="btnNew">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> 새 메모
      </button>
      <button class="foot-btn" id="btnImport">
        <svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"/></svg> 열기
      </button>
      <button class="foot-btn" id="btnTheme" aria-label="테마">
        <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </aside>

  <!-- Action sheet -->
  <div class="sheet-scrim" id="sheetScrim"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="sheet-title" id="sheetTitle">메모</div>
    <div class="sheet-item" id="actRename">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> 이름 바꾸기
    </div>
    <div class="sheet-item" id="actExport">
      <svg viewBox="0 0 24 24"><path d="M12 4v12M7 11l5 5 5-5"/><path d="M5 20h14"/></svg> .html로 저장
    </div>
    <div class="sheet-item" id="actDuplicate">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg> 복제
    </div>
    <div class="sheet-item danger" id="actDelete">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg> 삭제
    </div>
  </div>

  <input type="file" id="fileInput" class="hidden-input" accept=".html,.htm,text/html">
  <div class="toast" id="toast"></div>

<script>
"use strict";
(function () {
  /* ---------- IndexedDB layer ---------- */
  const DB_NAME = "inkMemoDB", STORE = "notes", DB_VER = 1;
  let db = null;

  function openDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) {
          const os = d.createObjectStore(STORE, { keyPath: "id" });
          os.createIndex("updatedAt", "updatedAt");
        }
      };
      r.onsuccess = e => { db = e.target.result; res(db); };
      r.onerror = e => rej(e.target.error);
    });
  }
  function tx(mode) { return db.transaction(STORE, mode).objectStore(STORE); }
  function dbGetAll() {
    return new Promise((res, rej) => {
      const r = tx("readonly").getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror = () => rej(r.error);
    });
  }
  function dbPut(note) {
    return new Promise((res, rej) => {
      const r = tx("readwrite").put(note);
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
  }
  function dbDelete(id) {
    return new Promise((res, rej) => {
      const r = tx("readwrite").delete(id);
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
  }

  /* localStorage fallback (for file:// quirks on some devices) */
  const LS_KEY = "inkMemoFallback";
  let useFallback = false;
  function lsGetAll() { try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch { return []; } }
  function lsSave(arr) { try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch (e) { console.warn(e); } }

  /* ---------- State ---------- */
  let notes = [];          // in-memory cache
  let currentId = null;
  let saveTimer = null;
  let theme = "light";

  /* ---------- Elements ---------- */
  const $ = id => document.getElementById(id);
  const editor = $("editor"), curTitle = $("curTitle");
  const noteList = $("noteList"), searchInput = $("searchInput");
  const saver = $("saver"), saverText = $("saverText");
  const toastEl = $("toast");

  /* ---------- Helpers ---------- */
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const now = () => Date.now();
  function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

  function fmtDate(ts) {
    const d = new Date(ts), n = new Date();
    const sameDay = d.toDateString() === n.toDateString();
    const pad = x => String(x).padStart(2, "0");
    if (sameDay) return `오늘 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const yest = new Date(n); yest.setDate(n.getDate() - 1);
    if (d.toDateString() === yest.toDateString()) return `어제 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    if (d.getFullYear() === n.getFullYear()) return `${d.getMonth() + 1}월 ${d.getDate()}일`;
    return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())}`;
  }
  function deriveTitle(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html || "";
    const text = (tmp.textContent || "").trim().replace(/\s+/g, " ");
    return text ? text.slice(0, 40) : "제목 없는 메모";
  }
  function previewOf(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html || "";
    const text = (tmp.textContent || "").trim().replace(/\s+/g, " ");
    return text.slice(0, 60);
  }

  let toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1900);
  }

  function setSaver(mode) {
    saver.className = "saver " + mode;
    saverText.textContent = mode === "dirty" ? "기록 중" : mode === "saved" ? "저장됨" : "";
    if (mode === "saved") setTimeout(() => { if (saver.classList.contains("saved")) { saver.className = "saver"; saverText.textContent = ""; } }, 1600);
  }

  /* ---------- Persistence wrappers ---------- */
  async function persist(note) {
    if (useFallback) { const a = notes.slice(); lsSave(a); }
    else await dbPut(note);
  }
  async function persistDelete(id) {
    if (useFallback) lsSave(notes);
    else await dbDelete(id);
  }

  /* ---------- Rendering ---------- */
  function sortNotes() { notes.sort((a, b) => b.updatedAt - a.updatedAt); }

  function renderList() {
    sortNotes();
    const q = (searchInput.value || "").trim().toLowerCase();
    const filtered = q
      ? notes.filter(n => (n.title + " " + previewOf(n.html)).toLowerCase().includes(q))
      : notes;
    noteList.innerHTML = "";
    if (!filtered.length) {
      const e = document.createElement("div");
      e.className = "list-empty";
      e.textContent = q ? "검색 결과가 없어요" : "메모를 추가해 보세요";
      noteList.appendChild(e);
      return;
    }
    filtered.forEach(n => {
      const item = document.createElement("div");
      item.className = "note-item" + (n.id === currentId ? " active" : "");
      item.innerHTML =
        `<div class="ni-title"></div><div class="ni-meta"></div>`;
      item.querySelector(".ni-title").textContent = n.title || "제목 없는 메모";
      const prev = previewOf(n.html);
      item.querySelector(".ni-meta").textContent = fmtDate(n.updatedAt) + (prev ? "  ·  " + prev : "");
      item.addEventListener("click", () => { selectNote(n.id); closeDrawer(); });
      noteList.appendChild(item);
    });
  }

  function reflectCurrent() {
    const n = notes.find(x => x.id === currentId);
    if (!n) {
      document.body.classList.add("no-note");
      curTitle.textContent = "메모";
      editor.innerHTML = "";
      return;
    }
    document.body.classList.remove("no-note");
    curTitle.textContent = n.title || "제목 없는 메모";
    if (editor.innerHTML !== n.html) editor.innerHTML = n.html || "";
  }

  /* ---------- Actions ---------- */
  function selectNote(id) {
    flushSave(true);
    currentId = id;
    reflectCurrent();
    renderList();
  }

  async function createNote(html, title) {
    flushSave(true);
    const n = {
      id: uid(),
      title: title || "제목 없는 메모",
      html: html || "",
      createdAt: now(),
      updatedAt: now()
    };
    notes.unshift(n);
    currentId = n.id;
    await persist(n);
    reflectCurrent();
    renderList();
    editor.focus();
  }

  function scheduleSave() {
    setSaver("dirty");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => flushSave(false), 550);
  }
  async function flushSave(silent) {
    clearTimeout(saveTimer); saveTimer = null;
    const n = notes.find(x => x.id === currentId);
    if (!n) return;
    const html = editor.innerHTML;
    if (html === n.html) return;
    n.html = html;
    n.title = deriveTitle(html);
    n.updatedAt = now();
    curTitle.textContent = n.title;
    try { await persist(n); if (!silent) setSaver("saved"); }
    catch (e) { console.warn(e); toast("저장에 문제가 생겼어요"); }
    renderList();
  }

  async function deleteNote(id) {
    const idx = notes.findIndex(n => n.id === id);
    if (idx < 0) return;
    notes.splice(idx, 1);
    await persistDelete(id);
    if (currentId === id) {
      sortNotes();
      currentId = notes.length ? notes[0].id : null;
    }
    reflectCurrent();
    renderList();
    toast("메모를 삭제했어요");
  }

  async function duplicateNote(id) {
    const src = notes.find(n => n.id === id);
    if (!src) return;
    await createNote(src.html, (src.title || "메모") + " (사본)");
    toast("복제했어요");
  }

  function renameNote(id) {
    const n = notes.find(x => x.id === id);
    if (!n) return;
    const name = prompt("메모 이름", n.title || "");
    if (name === null) return;
    n.title = name.trim() || deriveTitle(n.html);
    n.updatedAt = now();
    persist(n);
    if (id === currentId) curTitle.textContent = n.title;
    renderList();
  }

  /* ---------- HTML export ---------- */
  function exportNote(id) {
    const n = notes.find(x => x.id === id);
    if (!n) return;
    const title = n.title || "메모";
    const doc =
`<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="Ink Memo">
<meta name="ink-memo-created" content="${new Date(n.createdAt).toISOString()}">
<title>${escapeHtml(title)}</title>
<style>
  body{margin:0 auto;max-width:760px;padding:32px 20px;line-height:1.7;
       font-family:-apple-system,"Noto Sans KR",sans-serif;color:#1c1b19;word-break:break-word;}
  img{max-width:100%;height:auto;} a{color:#2f4275;}
  blockquote{border-left:3px solid #2f4275;margin:8px 0;padding:2px 0 2px 14px;color:#555;}
  table{border-collapse:collapse;} td,th{border:1px solid #ddd;padding:4px 8px;}
  pre{background:#f0ede6;padding:12px;border-radius:8px;overflow-x:auto;}
</style>
</head>
<body>
${n.html || ""}
</body>
</html>`;
    const safeName = title.replace(/[\\/:*?"<>|]+/g, "_").slice(0, 50) || "memo";
    const blob = new Blob([doc], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = safeName + ".html";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    toast(".html로 저장했어요");
  }

  /* ---------- HTML import ---------- */
  function sanitizeImported(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    // strip scripts and event handlers
    doc.querySelectorAll("script, link[rel='stylesheet'], meta, base").forEach(el => el.remove());
    doc.querySelectorAll("*").forEach(el => {
      [...el.attributes].forEach(attr => {
        const n = attr.name.toLowerCase();
        if (n.startsWith("on")) el.removeAttribute(attr.name);
        if ((n === "href" || n === "src") && /^\s*javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
      });
    });
    const titleEl = doc.querySelector("title");
    const created = doc.querySelector("meta[name='ink-memo-created']");
    return {
      html: doc.body ? doc.body.innerHTML.trim() : html,
      title: titleEl ? titleEl.textContent.trim() : "",
      created: created ? Date.parse(created.content) : null
    };
  }

  function importFile(file) {
    const reader = new FileReader();
    reader.onload = async () => {
      const raw = String(reader.result || "");
      const parsed = sanitizeImported(raw);
      const fallbackName = file.name.replace(/\.(html?|HTML?)$/i, "");
      await createNote(parsed.html, parsed.title || fallbackName);
      toast("불러왔어요");
    };
    reader.onerror = () => toast("파일을 읽지 못했어요");
    reader.readAsText(file, "UTF-8");
  }

  /* ---------- Drawer / sheet ---------- */
  function openDrawer() { document.body.classList.add("drawer-open"); }
  function closeDrawer() { document.body.classList.remove("drawer-open"); }
  function openSheet() {
    const n = notes.find(x => x.id === currentId);
    if (!n) return;
    $("sheetTitle").textContent = n.title || "메모";
    document.body.classList.add("sheet-open");
  }
  function closeSheet() { document.body.classList.remove("sheet-open"); }

  /* ---------- Theme ---------- */
  function applyTheme(t) {
    theme = t;
    document.documentElement.setAttribute("data-theme", t);
    document.querySelector('meta[name=theme-color]').setAttribute("content", t === "dark" ? "#14161d" : "#1f2b4d");
    $("themeIcon").innerHTML = t === "dark"
      ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>'
      : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
    try { localStorage.setItem("inkMemoTheme", t); } catch {}
  }
  function detectTheme() {
    let t = null;
    try { t = localStorage.getItem("inkMemoTheme"); } catch {}
    if (!t) t = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    applyTheme(t);
  }

  /* ---------- Format commands ---------- */
  function exec(cmd, val) {
    editor.focus();
    try { document.execCommand("styleWithCSS", false, true); } catch {}
    document.execCommand(cmd, false, val || null);
    scheduleSave();
  }

  /* ---------- Wire up ---------- */
  function bind() {
    $("btnMenu").addEventListener("click", openDrawer);
    $("scrim").addEventListener("click", closeDrawer);
    $("btnNew").addEventListener("click", () => { createNote("", "제목 없는 메모"); closeDrawer(); });
    $("emptyCreate").addEventListener("click", () => createNote("", "제목 없는 메모"));
    $("btnImport").addEventListener("click", () => $("fileInput").click());
    $("btnTheme").addEventListener("click", () => applyTheme(theme === "dark" ? "light" : "dark"));

    $("fileInput").addEventListener("change", e => {
      const f = e.target.files && e.target.files[0];
      if (f) importFile(f);
      e.target.value = "";
      closeDrawer();
    });

    // editor
    editor.addEventListener("input", scheduleSave);
    editor.addEventListener("blur", () => flushSave(false));

    // format toolbar
    $("formatbar").addEventListener("mousedown", e => {
      const b = e.target.closest(".fbtn");
      if (b) { e.preventDefault(); exec(b.dataset.cmd, b.dataset.val); }
    });
    $("formatbar").addEventListener("touchstart", e => {
      const b = e.target.closest(".fbtn");
      if (b) { e.preventDefault(); exec(b.dataset.cmd, b.dataset.val); }
    }, { passive: false });

    const colorPick = $("colorPick"), colorSwatch = $("colorSwatch");
    colorPick.addEventListener("input", () => {
      colorSwatch.style.background = colorPick.value;
      exec("foreColor", colorPick.value);
    });

    // search
    searchInput.addEventListener("input", renderList);

    // more / sheet
    $("btnMore").addEventListener("click", openSheet);
    $("sheetScrim").addEventListener("click", closeSheet);
    $("actRename").addEventListener("click", () => { closeSheet(); renameNote(currentId); });
    $("actExport").addEventListener("click", () => { closeSheet(); flushSave(true); exportNote(currentId); });
    $("actDuplicate").addEventListener("click", () => { closeSheet(); duplicateNote(currentId); });
    $("actDelete").addEventListener("click", () => {
      closeSheet();
      const n = notes.find(x => x.id === currentId);
      if (n && confirm(`'${n.title || "이 메모"}'를 삭제할까요?`)) deleteNote(currentId);
    });

    // save before leaving
    window.addEventListener("beforeunload", () => flushSave(true));
    document.addEventListener("visibilitychange", () => { if (document.hidden) flushSave(true); });
  }

  /* ---------- Init ---------- */
  async function init() {
    detectTheme();
    bind();
    try {
      await openDB();
      notes = await dbGetAll();
    } catch (e) {
      console.warn("IndexedDB unavailable, using localStorage fallback", e);
      useFallback = true;
      notes = lsGetAll();
    }
    sortNotes();
    currentId = notes.length ? notes[0].id : null;
    reflectCurrent();
    renderList();

    // PWA file handler: OS에서 .html 파일을 이 앱으로 열었을 때
    if ("launchQueue" in window && window.LaunchParams && "files" in LaunchParams.prototype) {
      launchQueue.setConsumer(async (params) => {
        if (!params || !params.files || !params.files.length) return;
        for (const handle of params.files) {
          try {
            const file = await handle.getFile();
            importFile(file);
          } catch (e) { console.warn("파일 열기 실패", e); }
        }
      });
    }
  }

  init();
})();
</script>
<script>
// Service Worker 등록 (오프라인 동작 + 설치형 PWA)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .catch((e) => console.warn("Service worker 등록 실패:", e));
  });
}
</script>
</body>
</html>
